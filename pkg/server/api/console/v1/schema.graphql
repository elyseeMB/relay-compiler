interface Entity {
  id: ID!
}

enum Role {
  ADMIN
  CUSTOMER
}

enum Status {
  PRIVATE
  PUBLIC
}

enum AccessLevel {
  FREE
  PAID
}

type User implements Entity {
  id: ID!
  email: String!
  fullName: String!
  role: Role!
}

type Article implements Entity {
  id: ID!
  title: String!
  summary: String
  body: String!
  accessLevel: AccessLevel!
  status: Status!
  users: User!
  draft: Boolean!
}

type Query {
  users: [User!]!
  articles: [Article!]!
}

input NewArticle {
  UserId: ID!
  title: String!
  summary: String
  body: String!
  draft: Boolean = false
  status: Status = PRIVATE
  accessLevel: AccessLevel = FREE
}

input NewUser {
  fullName: String!
  email: String!
  role: Role = ADMIN
}

type Mutation {
  createUser(input: NewUser!): User!
  createArticle(input: NewArticle!): Article!
}
